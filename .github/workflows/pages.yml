name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Assemble static site
        run: |
          set -eux
          mkdir -p ./_site
          # 复制纯静态资源
          cp index.html ./_site/
          cp -r src ./_site/
          # .nojekyll：防止 GitHub Pages 把 src/ 下的东西当成 Jekyll 源处理
          touch ./_site/.nojekyll
          # 不复制的内容（后端、源文档、脚本、git 等）：
          #   backend/  — FastAPI 源码，不参与静态部署
          #   docs/     — 设计文档，源码阅读用
          #   scripts/  — 开发脚本
          #   .git .github .gitignore README.md  — 仓库元信息
          ls -la ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
